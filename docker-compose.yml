services:
  mysql:
    image: mysql:8.0
    container_name: nuba_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nuba
      MYSQL_USER: nuba_user
      MYSQL_PASSWORD: nuba_pass
    ports:
      - "3306:3306"
    volumes:
      - nuba_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  adminer:
    image: adminer
    container_name: nuba_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  nuba_mysql_data:
